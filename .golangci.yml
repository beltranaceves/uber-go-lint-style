# golangci-lint configuration for Uber Go Style Guide
# Reference: https://github.com/uber-go/guide/blob/master/style.md#linting
#
# Recommended linters (per Uber style guide):
# - errcheck: error handling
# - goimports: import formatting
# - revive: style mistakes (modern replacement for golint)
# - govet: common mistakes
# - staticcheck: static analysis

run:
  timeout: 5m
    - docs
    - bin
  skip-files:
    - ".*_test.go$"

linters:
  enable:
    - errcheck
    - goimports
    - revive
    - govet
    - staticcheck
  disable-all: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  goimports:
    # Use local module path for grouping
    local-prefixes: github.com/beltranaceves/uber-go-lint-style

  revive:
    # Use custom revive configuration file
    config: ./revive.toml
    severity: warning

  govet:
    enable:
      - atomicalign
      - printf
      - shadow
      - structtag

issues:
  exclude-rules:
    # Exclude tests from some linters
    - path: _test\.go
      linters:
        - errcheck
