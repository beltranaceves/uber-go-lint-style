version: "2"

linters:
  default: none
  enable:
    - uber-go-lint-style
  settings:
    custom:
      uber-go-lint-style:
        type: "module"
        description: "Uber Go style guide linter"
        original-url: "github.com/beltranaceves/uber-go-lint-style"
        # Disabled rules provided as YAML text. By default exclude TodoRule.
        settings:
          disabled_rules_yaml: |
            - todo

severity:
  default: info
  rules:
    - linters:
        - uber-go-lint-style
      severity: info
