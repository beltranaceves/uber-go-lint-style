# golangci-lint configuration for Uber Go Style customizations

linters-settings:
  custom:
    uber-go-style:
      path: ./bin/uber-go-lint
      description: Uber Go Style Guide Linter
      original-url: https://github.com/beltranaceves/uber-go-lint-style

linters:
  disable-all: false
  enable:
    - uber-go-style

output:
  format: colored-line-number
  sort-results: true
